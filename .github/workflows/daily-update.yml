name: Daily Repository Update

on:
  schedule:
    - cron: '30 2 * * *'   
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "23f1000704@ds.study.iitm.ac.in"

      - name: 23f1000704@ds.study.iitm.ac.in - Create daily commit
        run: |
          echo "Run ID: $GITHUB_RUN_ID" >> daily-log.txt
          echo "Timestamp: $(date -u)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily update - $GITHUB_RUN_ID"
          git push